# Example device entrypoint: copy to e.g. litterbox.yaml, adjust name/friendly_name,
# cats, timezone, etc., and compile or flash this file (not litterbox-monitor.yaml alone).

packages:
  - !include litterbox-monitor.yaml

substitutions:
  name: litterbox
  friendly_name: "Litterbox"

  cats:
    - "Cat 1"
    - "Cat 2"

api:
  encryption:
    key: !secret litterbox_api_key

ota:
  - platform: esphome
    password: !secret litterbox_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret litterbox_ap_password
